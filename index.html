<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Someone Special</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
scroll-behavior:smooth;
}

body{
overflow-x:hidden;
scroll-snap-type:y mandatory;
}

/* sections */

.section{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:40px;
scroll-snap-align:start;
}

.section1{
background:linear-gradient(120deg,#1e3c72,#2a5298);
color:white;
}

.section2{
background:#fff5f7;
}

.section3{
background:linear-gradient(120deg,#ff9a9e,#fad0c4);
}

/* typing effect */

#typing{
font-size:28px;
width:60%;
}

/* photos */

.gallery img{
width:200px;
margin:10px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

/* buttons */

button{
padding:12px 30px;
font-size:18px;
border:none;
border-radius:8px;
cursor:pointer;
margin:10px;
}

.yes{
background:#28a745;
color:white;
}

.no{
background:#dc3545;
color:white;
position:relative;
}

#result{
margin-top:30px;
font-size:30px;
}

/* fireworks */

.fireworks{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
display:none;
}

.spark{
position:absolute;
width:8px;
height:8px;
border-radius:50%;
animation:explode 1s linear forwards;
}

@keyframes explode{
0%{transform:scale(1);opacity:1;}
100%{transform:translateY(-200px) scale(0);opacity:0;}
}

</style>
</head>

<body>


<div class="fireworks" id="fireworks"></div>

<!-- PAGE 1 -->

<div class="section section1">
<h1>Hi... You are here ❤️</h1>
<p>Scroll down</p>
</div>

<!-- PAGE 2 -->

<div class="section section2">

<h2>My Message</h2>

<p id="typing"></p>

</div>

<!-- PAGE 3 -->

<div class="section section3">

<h1>Will you marry me? 💍</h1>

<button class="yes" onclick="yesAnswer()">Yes</button>
<button class="no" id="noBtn">No</button>

<div id="result"></div>

</div>

<script>

/* typing message */

let text="You are the most special person in my life. Every moment with you is beautiful and I want to spend my whole life with you.";

let i=0;

function typing(){

if(i<text.length){
document.getElementById("typing").innerHTML+=text.charAt(i);
i++;
setTimeout(typing,40);
}

}

typing();

/* runaway no button */

let noBtn=document.getElementById("noBtn");

noBtn.addEventListener("mouseover",function(){

let x=Math.random()*300-150;
let y=Math.random()*200-100;

noBtn.style.transform=`translate(${x}px,${y}px)`;

});

/* yes answer */

function yesAnswer(){

document.getElementById("result").innerHTML=
"Congratulations ❤️ You won me! 🎉";

let fw=document.getElementById("fireworks");

fw.style.display="block";

for(let i=0;i<80;i++){

let spark=document.createElement("div");

spark.className="spark";

spark.style.left=Math.random()*100+"%";
spark.style.top=Math.random()*100+"%";

spark.style.background=
`hsl(${Math.random()*360},100%,50%)`;

fw.appendChild(spark);

}

}

</script>

</body>
</html>
